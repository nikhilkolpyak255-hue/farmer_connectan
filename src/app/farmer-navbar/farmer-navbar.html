<nav class="og-nav" [class.is-open]="menuOpen">
    <div class="nav-inner">
        <a class="brand" routerLink="/farmerhomepage" (click)="closeAll()">
            <!-- <i class="fa-solid fa-leaf"></i> -->
            🌾
            <span>Farmer-Connect</span>
        </a>

        <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle navigation">
            <i class="fa-solid" [ngClass]="menuOpen ? 'fa-xmark' : 'fa-bars'"></i>
        </button>

        <ul class="links" [class.show]="menuOpen">
            <li>
                <a routerLink="/aboutus" (click)="closeAll()">
                    <i class="fa-solid fa-circle-info"></i> About Us
                </a>
            </li>

            <li>
                <a routerLink="/account" (click)="closeAll()">
                    <i class="fa-solid fa-user-circle"></i> Account
                </a>
            </li>

            <li class="dropdown" [class.open]="openDropdown === 'bidding'">
                <button (click)="toggleDropdown('bidding')">
                    <i class="fa-solid fa-gavel"></i> Bidding
                    <i class="fa-solid fa-chevron-down caret"></i>
                </button>
                <ul class="dropdown-menu">
                    <li><a routerLink="/farmerbidrequest" (click)="closeAll()">View Bid</a></li>
                    <li><a routerLink="/product" (click)="closeAll()">Add Bid</a></li>
                </ul>
            </li>

            <!-- <li>
                <a routerLink="/history" (click)="closeAll()">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </a>
            </li> -->

            <li class="dropdown" [class.open]="openDropdown === 'junction'">
                <button (click)="toggleDropdown('junction')">
                    <i class="fa-solid fa-tractor"></i> Junction
                    <i class="fa-solid fa-chevron-down caret"></i>
                </button>
                <ul class="dropdown-menu">
                    <li><a routerLink="/addjunction" (click)="closeAll()">Add Equipment</a></li>
                    <li><a routerLink="/rentjunction" (click)="closeAll()">Rent Equipment</a></li>
                </ul>
            </li>

            <li>
                <a routerLink="/history" (click)="closeAll()">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </a>
            </li>
        </ul>

    </div>
</nav>
